<div class="tech-stack-container">
    <div class="section-header">
        <h2>Tech ToolBox</h2>
        <p>Here are some of the technologies I have worked with:</p>

    </div>
    <div class="tech-container">
        <div class="md:w-1/4">
            <div class="card">
                <div (click)="selectCategory(category)" class="bubbly-tab snap-center shrink-0" *ngFor="let category of categories" [ngClass]="{'active': activeCategory === category}">
                    <span class="material-symbols-outlined">{{category.icon}}</span>
                    <span>{{category.name}}</span>
                </div>
                
            </div>

        </div>
        <div class="dynamic-container">
            <div class="tab-content">
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-6">

                    <div class="skill-card" *ngFor="let skill of activeCategory.skills" >
                        <div
                            class="w-16 h-16 bg-[#ffdfd6] rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                            <i [ngClass]="skill.icon"></i>

                            <!-- <span class="material-symbols-outlined text-4xl text-[#ff8a7a]">{{skill.icon}}</span> -->
                        </div>
                        <h4 class="font-bold text-slate-800">{{skill.name}}</h4>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
